name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Test ${{ matrix.os }} (${{ matrix.simd_mode }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        simd_mode: [portable, native]
    env:
      FASTPFOR_SIMD_MODE: ${{ matrix.simd_mode }}
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v0-${{ matrix.simd_mode }}"
      - uses: taiki-e/install-action@v2
        with: { tool: 'just,cargo-binstall' }
      # Enable core dumps so SIGSEGV crashes produce a dump for post-mortem analysis.
      # ulimit is per-process, so it must be set in the same shell that runs the tests.
      - name: Run tests (with core dumps enabled)
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sudo sysctl -w kern.coredump=1
            sudo sysctl -w kern.corefile='/cores/core.%N.%P'
            sudo mkdir -p /cores && sudo chmod 1777 /cores
          else
            sudo sysctl -w kernel.core_pattern='/tmp/cores/core.%e.%p'
            sudo mkdir -p /tmp/cores && sudo chmod 1777 /tmp/cores
          fi
          ulimit -c unlimited
          just ci-test
      # On failure, extract a minimal text report from any core dump (backtrace, file info).
      # We deliberately avoid uploading the raw core dump (can be ~1.5 GB).
      - name: Collect crash report
        if: failure()
        run: |
          mkdir -p crash-report
          CORE_DIR=$([[ "$RUNNER_OS" == "macOS" ]] && echo /cores || echo /tmp/cores)
          for core in "$CORE_DIR"/core.* ; do
            [[ -f "$core" ]] || continue
            report="crash-report/$(basename "$core").txt"
            {
              echo "=== Core dump ==="
              echo "Path: $core"
              echo "File: $(file "$core")"
              echo ""
              if [[ "$RUNNER_OS" == "macOS" ]]; then
                bin_name=$(basename "$core" | sed -E 's/core\.([^.]+)\.[0-9]+/\1/')
                bin=$(find target -path '*/deps/*' -name "${bin_name}*" -type f -perm /111 ! -name '*.d' 2>/dev/null | head -1)
                [[ -z "$bin" ]] && bin=$(find target/debug -maxdepth 2 -name "${bin_name}*" -type f -perm /111 2>/dev/null | head -1)
                echo "Binary: ${bin:-not found}"
                echo ""
                echo "=== Backtrace ==="
                if [[ -n "$bin" && -x "$bin" ]]; then
                  lldb --no-lldbinit --batch \
                    -o "target create --core '$core' '$bin'" \
                    -o "thread backtrace all" \
                    -o quit 2>&1
                else
                  echo "(trying lldb with core only)"
                  lldb --no-lldbinit --batch \
                    -o "target create --core '$core'" \
                    -o "thread backtrace all" \
                    -o quit 2>&1
                fi
              else
                bin=$(file "$core" | sed -n "s/.*from '\([^']*\)'.*/\1/p")
                [[ -z "$bin" ]] && bin=$(file "$core" | grep -oE "execfn: '[^']+'" | cut -d"'" -f2)
                echo "Binary: ${bin:-not found}"
                echo ""
                echo "=== Backtrace ==="
                if [[ -n "$bin" && -x "$bin" ]]; then
                  gdb -batch -ex "thread apply all bt full" "$bin" "$core" 2>&1
                else
                  echo "(trying gdb with core only)"
                  gdb -batch -ex "core-file $core" -ex "thread apply all bt" 2>&1
                fi
              fi
            } > "$report" 2>&1
          done
          echo "=== crash-report ===" && ls -lh crash-report/ || true
          shopt -s nullglob; reports=(crash-report/*.txt)
          if [[ ${#reports[@]} -gt 0 ]]; then cat "${reports[@]}"; else echo "(no core dumps found)"; fi
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: crash-report-${{ matrix.os }}-${{ matrix.simd_mode }}-${{ github.sha }}
          path: crash-report/
          if-no-files-found: warn

  test-nightly:
    name: Nightly-specific tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
        uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with: { tool: 'just' }
      - run: rustup install nightly --profile minimal
      - run: just test-publish

  test-msrv:
    name: Test MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
        uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with: { tool: 'just' }
      - name: Read MSRV
        id: msrv
        run: echo "value=$(just get-msrv)" >> $GITHUB_OUTPUT
      - name: Install MSRV Rust ${{ steps.msrv.outputs.value }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.msrv.outputs.value }}
      - run: just ci_mode=0 ci-test-msrv  # Ignore warnings in MSRV

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    env:
      # The number of seconds to run the fuzz target.
      FUZZ_TIME: 60
    strategy:
      matrix:
        include:
          - fuzz_target: cpp_roundtrip
          - fuzz_target: encode_oracle
          - fuzz_target: decode_oracle
          - fuzz_target: decode_arbitrary
    steps:
      - uses: actions/checkout@v6
        with: {persist-credentials: false, submodules: recursive}
      # Install the nightly Rust channel.
      - run: rustup toolchain install nightly
      - run: rustup default nightly
      # Install and cache `cargo-fuzz`.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-binstall
      - run: cargo binstall -y cargo-fuzz@0.13.1 # Pinned to avoid breakage.
      # Build and then run the fuzz target.
      #  --target x86_64-unknown-linux-gnu is necessary to not default to musl, which is not supported by cargo-fuzz.
      - run: cargo fuzz build --target x86_64-unknown-linux-gnu ${{ matrix.fuzz_target }}
      - run: cargo fuzz run --target x86_64-unknown-linux-gnu ${{ matrix.fuzz_target }} -- -max_total_time=${{ env.FUZZ_TIME }}
      # Upload fuzzing artifacts on failure for post-mortem debugging.
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: fuzzing-artifacts-${{ matrix.fuzz_target }}-${{ github.sha }}
          path: fuzz/artifacts

  coverage:
    name: Code Coverage
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with: { tool: 'just,cargo-llvm-cov' }
      - name: Generate code coverage
        run: just ci-coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/llvm-cov/codecov.info

  # This job checks if any of the previous jobs failed or were canceled.
  # This approach also allows some jobs to be skipped if they are not needed.
  ci-passed:
    needs: [ test, test-nightly, test-msrv, fuzz ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Result of the needed steps
        run: echo "${{ toJSON(needs) }}"
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1

  release:
    # Some dependencies of the `ci-passed` job might be skipped, but we still want to run if the `ci-passed` job succeeded.
    if: always() && startsWith(github.ref, 'refs/tags/') && needs.ci-passed.result == 'success'
    name: Publish to crates.io
    needs: [ ci-passed ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { submodules: recursive }
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
